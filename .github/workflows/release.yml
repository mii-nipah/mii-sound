name: Release

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild and upload assets even if the release tag already exists"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.tag_check.outputs.should_release }}
      tag_exists: ${{ steps.tag_check.outputs.exists }}
      release_exists: ${{ steps.tag_check.outputs.release_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Read crate version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["packages"][0]["version"])')"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Crate version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        env:
          TAG: ${{ steps.version.outputs.tag }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "release_exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "release_exists=false" >> "$GITHUB_OUTPUT"
              echo "Tag $TAG already exists, but no GitHub Release exists; will upload assets."
            fi

            if [ "$FORCE_RELEASE" = "true" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Tag $TAG already exists; force upload requested."
            elif [ "$(gh release view "$TAG" >/dev/null 2>&1 && echo true || echo false)" = "false" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Tag $TAG already exists; skipping release."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist; will release."
          fi

  build:
    name: Build Linux binary
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --bin mii-sound

      - name: Package Linux binary
        id: package
        run: |
          set -euo pipefail
          TARGET="$(rustc -Vv | awk '/^host:/ { print $2 }')"
          ASSET_NAME="mii-sound-${VERSION}-${TARGET}"
          STAGE="dist/${ASSET_NAME}"
          ARCHIVE="dist/${ASSET_NAME}.tar.gz"

          mkdir -p "$STAGE"
          cp target/release/mii-sound "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          tar -czf "$ARCHIVE" -C dist "$ASSET_NAME"

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${ASSET_NAME}.tar.gz" > "${ASSET_NAME}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${ASSET_NAME}.tar.gz" > "${ASSET_NAME}.tar.gz.sha256")
          fi

          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish regular WGPU crate to crates.io
        if: needs.prepare.outputs.tag_exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN is not set; skipping crates.io publish."
            exit 0
          fi

          log_file="$(mktemp)"
          if cargo publish --locked --no-default-features 2>&1 | tee "$log_file"; then
            exit 0
          fi

          if grep -Eqi 'already exists|already uploaded' "$log_file"; then
            echo "crates.io already has $TAG; continuing to create the GitHub Release."
            exit 0
          fi

          exit 1

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create and push tag
        env:
          TAG_EXISTS: ${{ needs.prepare.outputs.tag_exists }}
        run: |
          set -euo pipefail
          if [ "$TAG_EXISTS" = "true" ]; then
            echo "Tag $TAG already exists; reusing it."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish release assets
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading assets with clobber."
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --generate-notes
          fi

          gh release upload "$TAG" dist/* --clobber
